<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roshan Giri Portfolio</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg-dark: #0f172a;
            --bg-light: #f8fafc;
            --text-dark: #1e293b;
            --text-light: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-light); }
        
        /* Navigation */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; }
        .nav-links a { color: white; margin: 0 15px; text-decoration: none; }
        .btn { background: var(--primary); padding: 10px 25px; border-radius: 25px; color: white; border: none; cursor: pointer; }

        /* Hero */
        .hero { text-align: center; padding: 50px 5%; background: radial-gradient(circle, #1e1b4b 0%, #0f172a 70%); }
        .hero h1 { font-size: 4rem; margin-top: 20px; }
        .hero img { width: 250px; border-radius: 50%; margin: 20px 0; border: 3px solid var(--primary); }

        /* Sections */
        section { padding: 80px 10%; }
        .light-bg { background: var(--bg-light); color: var(--text-dark); }
        h2 { font-size: 2.5rem; margin-bottom: 20px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* Contact Form */
        form input, form textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>

    <nav>
        <div><strong>RoshanG.</strong></div>
        <div class="nav-links"><a>Home</a><a>About</a><a>Work</a><a>Contact</a></div>
        <button class="btn">Hire Me</button>
    </nav>

    <header class="hero">
        <p>Roshan Giri</p>
        <h1>PORTFOLIO</h1>
        <img src="https://via.placeholder.com/200" alt="Roshan Giri">
    </header>

    <section class="light-bg">
        <h2>Introduction</h2>
        <div class="grid">
            <div class="card"><h3>20+</h3><p>Projects</p></div>
            <div class="card"><h3>3 Yrs</h3><p>Experience</p></div>
        </div>
    </section>

    <section>
        <h2>My Works</h2>
        <div class="grid">
            <div class="card" style="height: 200px;">Project 1</div>
            <div class="card" style="height: 200px;">Project 2</div>
            <div class="card" style="height: 200px;">Project 3</div>
        </div>
    </section>

    <section class="light-bg">
        <h2>Contact</h2>
        <form>
            <input type="text" placeholder="Name" required>
            <input type="email" placeholder="Email" required>
            <textarea placeholder="Message"></textarea>
            <button class="btn" type="submit">Send Message</button>
        </form>
    </section>

    <script>
        console.log("Portfolio loaded successfully.");
        // Add interactivity here (e.g., smooth scroll)
    </script>
</body>
</html>
